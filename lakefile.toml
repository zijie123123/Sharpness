name = "Leanproject"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Leanproject"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0-rc1"

[[lean_lib]]
name = "Leanproject"

[[lean_lib]]
name = "Sharpness"
